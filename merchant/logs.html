<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loglar — Entegrasyon</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/integrations.css">
</head>
<body>
<div class="app">

  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">E</div>
        <div><div class="logo-text">Entegrasyon<span>Entegrasyon Platformu</span></div></div>
      </div>
      <button class="sidebar-close" id="sidebarClose">×</button>
    </div>
    <div class="sidebar-store">
      <div class="store-avatar">T</div>
      <div><div class="store-name">Teknoloji A.Ş.</div><div class="store-plan">Pro Plan · 6 aktif</div></div>
    </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">A</div>
        <div><div class="user-name">Admin Kullanıcı</div><div class="user-role">Mağaza Sahibi</div></div>
      </div>
    </div>
  </aside>

  <div class="main">
    <header class="header">
      <button class="menu-btn" id="menuBtn">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="header-title">
        <h1>Aktivite Logları</h1>
        <p>Tüm entegrasyonlardan gelen birleşik kayıt akışı</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost btn-sm" onclick="exportLogs()">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="14" height="14" style="margin-right:4px"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          Dışa Aktar
        </button>
      </div>
    </header>

    <div class="content">

      <!-- Stats row -->
      <div class="summary-row">
        <div class="summary-chip">
          <span style="color:var(--success);font-weight:800">✓</span>
          <span class="val" id="statOk">0</span> Başarılı
        </div>
        <div class="summary-chip">
          <span style="color:var(--warning);font-weight:800">!</span>
          <span class="val" id="statWarn">0</span> Uyarı
        </div>
        <div class="summary-chip">
          <span style="color:var(--danger);font-weight:800">✗</span>
          <span class="val" id="statErr">0</span> Hata
        </div>
        <div class="summary-chip">
          <span style="color:var(--info);font-weight:800">ℹ</span>
          <span class="val" id="statInfo">0</span> Bilgi
        </div>
        <div class="summary-chip" style="margin-left:auto">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="13" height="13"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Bugün · Otomatik yenileniyor
        </div>
      </div>

      <!-- Filters -->
      <div class="card" style="padding:14px 18px;margin-bottom:16px">
        <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
          <div class="search-box" style="width:240px;flex-shrink:0">
            <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/></svg>
            <input type="text" class="search-input" id="logSearch" placeholder="Log ara…" oninput="applyFilters()">
          </div>

          <select class="form-control" style="width:auto;padding:7px 12px;font-size:13px" id="filterPlatform" onchange="applyFilters()">
            <option value="">Tüm Platformlar</option>
            <option value="trendyol">Trendyol</option>
            <option value="hepsiburada">Hepsiburada</option>
            <option value="ikas">İkas</option>
            <option value="parasut">Paraşüt</option>
            <option value="aras">Aras Kargo</option>
            <option value="efatura">Trendyol E-Faturam</option>
          </select>

          <select class="form-control" style="width:auto;padding:7px 12px;font-size:13px" id="filterType" onchange="applyFilters()">
            <option value="">Tüm Türler</option>
            <option value="ok">Başarılı</option>
            <option value="warn">Uyarı</option>
            <option value="error">Hata</option>
            <option value="info">Bilgi</option>
          </select>

          <select class="form-control" style="width:auto;padding:7px 12px;font-size:13px" id="filterFlow" onchange="applyFilters()">
            <option value="">Tüm Akışlar</option>
            <option value="siparis">Sipariş Akışı</option>
            <option value="stok">Stok Senkronu</option>
            <option value="fatura">Fatura Akışı</option>
            <option value="kargo">Kargo Akışı</option>
          </select>

          <button class="btn btn-ghost btn-sm" onclick="clearFilters()" style="margin-left:auto">Filtreleri Temizle</button>
        </div>
      </div>

      <!-- Log table -->
      <div class="card" style="padding:0;overflow:hidden">
        <div style="padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:13px;font-weight:600" id="logCountLabel">Yükleniyor…</div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-ghost btn-sm" id="btnAutoRefresh" onclick="toggleAutoRefresh()" style="font-size:11px">⏸ Duraksat</button>
          </div>
        </div>
        <div id="logList"></div>
        <div style="padding:14px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
          <div style="font-size:12px;color:var(--text-muted)" id="paginationInfo"></div>
          <div style="display:flex;gap:6px" id="pagination"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Log Detail Modal -->
<div class="modal-overlay" id="logDetailModal">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <div class="modal-title">Log Detayı</div>
      <button class="modal-close" onclick="closeModal('logDetailModal')">×</button>
    </div>
    <div class="modal-body" id="logDetailBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('logDetailModal')">Kapat</button>
    </div>
  </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script src="../js/nav.js"></script>
<script src="../js/app.js"></script>
<script>
const PLATFORMS = ['trendyol','hepsiburada','ikas','parasut','aras','efatura'];
const PLATFORM_LABELS = {
  trendyol: { label: 'Trendyol', bg: '#FF6000', color: '#fff', short: 'TY' },
  hepsiburada: { label: 'Hepsiburada', bg: '#FF6000', color: '#fff', short: 'HB' },
  ikas: { label: 'İkas', bg: '#6366F1', color: '#fff', short: 'İK' },
  parasut: { label: 'Paraşüt', bg: '#10B981', color: '#fff', short: 'PR' },
  aras: { label: 'Aras Kargo', bg: '#DC2626', color: '#fff', short: 'AR' },
  efatura: { label: 'E-Faturam', bg: '#D97706', color: '#fff', short: 'EF' },
};
const FLOW_LABELS = ['siparis','stok','fatura','kargo'];
const FLOW_NAMES = { siparis: 'Sipariş Akışı', stok: 'Stok Senkronu', fatura: 'Fatura Akışı', kargo: 'Kargo Akışı' };

const LOG_MESSAGES = {
  trendyol: [
    { type: 'ok', flow: 'siparis', msg: 'Sipariş #45231 başarıyla alındı', detail: 'Müşteri: Ahmet Yılmaz · Tutar: ₺44.999 · 1 ürün' },
    { type: 'ok', flow: 'stok', msg: 'Stok senkronu tamamlandı', detail: '156 ürün güncellendi · 0 hata' },
    { type: 'ok', flow: 'stok', msg: 'Fiyat güncellemesi gönderildi', detail: '43 ürün · Ortalama değişim: %2.3' },
    { type: 'warn', flow: 'stok', msg: 'Rate limit yaklaşıyor (%85)', detail: 'API çağrısı: 850/1000 · Sıfırlanma: 14 dk sonra' },
    { type: 'ok', flow: 'siparis', msg: 'Sipariş durumu güncellendi', detail: '#45229 → Kargoda · Barkod: TK9284712' },
    { type: 'ok', flow: 'siparis', msg: 'Sipariş #45228 alındı', detail: 'Müşteri: Fatma Kaya · Tutar: ₺9.499' },
    { type: 'ok', flow: 'stok', msg: 'Token başarıyla yenilendi', detail: 'Geçerlilik: 24 saat' },
    { type: 'error', flow: 'siparis', msg: 'Sipariş ürünü eşleştirilemedi', detail: 'SKU: NOTFOUND-001 · Manuel kontrol gerekli' },
  ],
  hepsiburada: [
    { type: 'ok', flow: 'siparis', msg: 'Sipariş #HB-8812 alındı', detail: 'Müşteri: Mehmet Demir · Tutar: ₺34.999' },
    { type: 'ok', flow: 'stok', msg: 'Stok güncellendi', detail: '48 ürün · Hepsiburada kataloğu senkron' },
    { type: 'warn', flow: 'stok', msg: 'Ürün listeleme hatası', detail: '2 ürün reddedildi · Eksik kategori bilgisi' },
    { type: 'ok', flow: 'siparis', msg: 'Sipariş #HB-8810 kargoya verildi', detail: 'Hepsijet · Barkod: HJ29481023' },
  ],
  ikas: [
    { type: 'ok', flow: 'siparis', msg: 'Yeni sipariş #IK-3341', detail: 'Müşteri: Ayşe Çelik · Tutar: ₺12.499' },
    { type: 'ok', flow: 'stok', msg: 'Ürün kataloğu senkronize edildi', detail: '89 ürün · Görsel + stok güncellendi' },
    { type: 'ok', flow: 'kargo', msg: 'Kargo barkodu oluşturuldu', detail: 'Sipariş #IK-3341 → Aras Kargo TK9284728' },
  ],
  parasut: [
    { type: 'ok', flow: 'fatura', msg: 'E-arşiv fatura oluşturuldu', detail: 'Fatura No: EA2026-0041 · Müşteri: Ahmet Yılmaz · ₺44.999' },
    { type: 'ok', flow: 'fatura', msg: 'E-arşiv fatura oluşturuldu', detail: 'Fatura No: EA2026-0040 · Müşteri: Fatma Kaya · ₺9.499' },
    { type: 'ok', flow: 'fatura', msg: 'Müşteri kartı oluşturuldu', detail: 'Mehmet Demir · İzmir Konak' },
    { type: 'info', flow: 'fatura', msg: 'Aylık fatura limiti: %42', detail: '42/100 fatura kullanıldı · Pro plan' },
  ],
  aras: [
    { type: 'ok', flow: 'kargo', msg: 'Barkod oluşturuldu: TK9284731', detail: 'Sipariş #45231 · Ahmet Yılmaz · İstanbul Kadıköy' },
    { type: 'ok', flow: 'kargo', msg: 'Kargo teslim edildi: TK9284718', detail: 'Sipariş #45219 · Zeynep Arslan → Teslim 09:34' },
    { type: 'ok', flow: 'kargo', msg: 'Barkod oluşturuldu: TK9284729', detail: 'Sipariş #IK-3341 · Ayşe Çelik · İstanbul Beşiktaş' },
    { type: 'warn', flow: 'kargo', msg: 'Teslimat gecikmesi', detail: 'TK9284705 · Ankara → Hava şartları nedeniyle 1 gün gecikme' },
  ],
  efatura: [
    { type: 'warn', flow: 'fatura', msg: 'API token süresi dolmak üzere', detail: 'Kalan süre: ~2 saat · Trendyol panelinden yenileyin' },
    { type: 'ok', flow: 'fatura', msg: 'E-arşiv fatura kesildi', detail: 'Fatura EA-TY-2026-0038 · ₺64.999 · iPhone 15 Pro' },
    { type: 'ok', flow: 'fatura', msg: 'E-arşiv fatura kesildi', detail: 'Fatura EA-TY-2026-0037 · ₺38.999 · Xiaomi 14 Ultra' },
  ],
};

function seededRand(s) { let x = Math.sin(s+1)*10000; return x-Math.floor(x); }
function rInt(s,n,max) { return Math.floor(seededRand(s*37+n*13)*max); }

function generateLogs(count) {
  const logs = [];
  const base = new Date(2026, 4, 22, 9, 41, 0);
  let t = new Date(base);
  let id = 1;

  PLATFORMS.forEach(platform => {
    const msgs = LOG_MESSAGES[platform];
    msgs.forEach((m, i) => {
      const entry = new Date(t);
      logs.push({
        id: id++,
        platform,
        type: m.type,
        flow: m.flow,
        msg: m.msg,
        detail: m.detail,
        time: entry,
        timeStr: pad(entry.getHours())+':'+pad(entry.getMinutes())+':'+pad(entry.getSeconds()),
      });
      t = new Date(t.getTime() - (rInt(id,3,12)+1)*60*1000 - rInt(id,4,59)*1000);
    });
  });

  logs.sort((a,b) => b.time - a.time);

  for (let i = logs.length; i < count; i++) {
    const s = i + 100;
    const platform = PLATFORMS[rInt(s,1,PLATFORMS.length)];
    const msgs = LOG_MESSAGES[platform];
    const m = msgs[rInt(s,2,msgs.length)];
    const entry = new Date(t);
    logs.push({
      id: id++,
      platform,
      type: m.type,
      flow: m.flow,
      msg: m.msg,
      detail: m.detail,
      time: entry,
      timeStr: pad(entry.getHours())+':'+pad(entry.getMinutes())+':'+pad(entry.getSeconds()),
    });
    t = new Date(t.getTime() - (rInt(s,5,5)+1)*60*1000 - rInt(s,6,59)*1000);
  }

  return logs;
}

function pad(n) { return String(n).padStart(2,'0'); }

const ALL_LOGS = generateLogs(200);
let filtered = [...ALL_LOGS];
let currentPage = 1;
const PAGE_SIZE = 50;
let autoRefresh = true;

function updateStats() {
  document.getElementById('statOk').textContent   = ALL_LOGS.filter(l=>l.type==='ok').length;
  document.getElementById('statWarn').textContent = ALL_LOGS.filter(l=>l.type==='warn').length;
  document.getElementById('statErr').textContent  = ALL_LOGS.filter(l=>l.type==='error').length;
  document.getElementById('statInfo').textContent = ALL_LOGS.filter(l=>l.type==='info').length;
}

function applyFilters() {
  const q        = document.getElementById('logSearch').value.toLowerCase();
  const platform = document.getElementById('filterPlatform').value;
  const type     = document.getElementById('filterType').value;
  const flow     = document.getElementById('filterFlow').value;

  filtered = ALL_LOGS.filter(l => {
    if (platform && l.platform !== platform) return false;
    if (type && l.type !== type) return false;
    if (flow && l.flow !== flow) return false;
    if (q && !l.msg.toLowerCase().includes(q) && !l.detail.toLowerCase().includes(q)) return false;
    return true;
  });

  currentPage = 1;
  render();
}

function clearFilters() {
  document.getElementById('logSearch').value = '';
  document.getElementById('filterPlatform').value = '';
  document.getElementById('filterType').value = '';
  document.getElementById('filterFlow').value = '';
  applyFilters();
}

function render() {
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  const start = (currentPage - 1) * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);

  document.getElementById('logCountLabel').textContent =
    total.toLocaleString('tr-TR') + ' kayıt' + (filtered.length < ALL_LOGS.length ? ` (${ALL_LOGS.length} toplam)` : '');

  document.getElementById('logList').innerHTML = slice.map(l => buildRow(l)).join('') ||
    '<div style="padding:40px;text-align:center;color:var(--text-muted)">Eşleşen log bulunamadı.</div>';

  document.getElementById('paginationInfo').textContent =
    `${start+1}–${Math.min(start+PAGE_SIZE,total)} / ${total.toLocaleString('tr-TR')} kayıt`;

  renderPagination(currentPage, totalPages);
}

function buildRow(l) {
  const p = PLATFORM_LABELS[l.platform] || { label: l.platform, bg: '#64748B', color: '#fff', short: '??' };
  const typeMap = {
    ok:    { cls: 'ok',   icon: '✓', bg: 'var(--success-light)', color: 'var(--success)' },
    warn:  { cls: 'warn', icon: '!', bg: 'var(--warning-light)', color: 'var(--warning)' },
    error: { cls: 'error',icon: '✗', bg: 'var(--danger-light)',  color: 'var(--danger)'  },
    info:  { cls: 'info', icon: 'i', bg: 'var(--info-light)',    color: 'var(--info)'    },
  };
  const t = typeMap[l.type] || typeMap.info;

  return `
  <div class="log-row" style="cursor:pointer" onclick="showLogDetail(${l.id})">
    <div class="log-icon" style="background:${p.bg};color:${p.color};font-size:11px">${p.short}</div>
    <div class="log-content">
      <div class="log-title">${l.msg}</div>
      <div class="log-detail">${l.detail}</div>
      <div class="log-meta">
        <span class="log-time">${l.timeStr}</span>
        <span class="badge badge-gray" style="font-size:10px">${FLOW_NAMES[l.flow]||l.flow}</span>
        <span style="font-size:11px;color:${t.color};font-weight:600">${p.label}</span>
      </div>
    </div>
    <div class="log-status ${t.cls}">${t.icon}</div>
  </div>`;
}

function renderPagination(current, total) {
  if (total <= 1) { document.getElementById('pagination').innerHTML = ''; return; }

  let pages = [];
  if (total <= 7) {
    for (let i = 1; i <= total; i++) pages.push(i);
  } else {
    pages = [1];
    if (current > 3) pages.push('…');
    for (let i = Math.max(2, current-1); i <= Math.min(total-1, current+1); i++) pages.push(i);
    if (current < total - 2) pages.push('…');
    pages.push(total);
  }

  document.getElementById('pagination').innerHTML = pages.map(p => {
    if (p === '…') return `<span style="padding:0 4px;color:var(--text-muted)">…</span>`;
    const active = p === current;
    return `<button class="btn btn-sm ${active ? 'btn-primary' : 'btn-ghost'}" onclick="goPage(${p})" style="min-width:32px">${p}</button>`;
  }).join('');
}

function goPage(p) {
  currentPage = p;
  render();
  document.querySelector('.content').scrollTo({ top: 0, behavior: 'smooth' });
}

function showLogDetail(id) {
  const l = ALL_LOGS.find(x => x.id === id);
  if (!l) return;
  const p = PLATFORM_LABELS[l.platform] || { label: l.platform, bg: '#64748B', color: '#fff' };
  const typeMap = {
    ok:    { label: 'Başarılı', cls: 'badge-success' },
    warn:  { label: 'Uyarı',   cls: 'badge-warning' },
    error: { label: 'Hata',    cls: 'badge-danger'  },
    info:  { label: 'Bilgi',   cls: 'badge-info'    },
  };
  const t = typeMap[l.type] || typeMap.info;

  document.getElementById('logDetailBody').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <div style="width:44px;height:44px;border-radius:10px;background:${p.bg};color:${p.color};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0">${PLATFORM_LABELS[l.platform]?.short||'??'}</div>
      <div>
        <div style="font-size:15px;font-weight:700">${l.msg}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${p.label} · ${l.timeStr}</div>
      </div>
      <span class="badge ${t.cls}" style="margin-left:auto">${t.label}</span>
    </div>
    <div style="background:var(--bg);border-radius:var(--radius-sm);padding:14px;font-size:13px;color:var(--text-secondary);margin-bottom:16px">${l.detail}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:12px">
      <div><span style="color:var(--text-muted)">Platform:</span> <strong>${p.label}</strong></div>
      <div><span style="color:var(--text-muted)">Akış:</span> <strong>${FLOW_NAMES[l.flow]||l.flow}</strong></div>
      <div><span style="color:var(--text-muted)">Saat:</span> <strong>${l.timeStr}</strong></div>
      <div><span style="color:var(--text-muted)">Log ID:</span> <strong>#${l.id}</strong></div>
    </div>
    <div class="mini-log" style="margin-top:16px">
      <div><span class="ts">${l.timeStr}</span><span class="cat">[${l.platform.toUpperCase()}]</span><span class="${l.type==='ok'?'ok':l.type==='warn'?'warn':l.type==='error'?'err':''}">${l.msg}</span></div>
      <div><span class="ts">${l.timeStr}</span><span class="cat">[DETAIL]</span>${l.detail}</div>
      <div><span class="ts">${l.timeStr}</span><span class="cat">[FLOW]</span>${FLOW_NAMES[l.flow]||l.flow}</div>
    </div>
  `;
  openModal('logDetailModal');
}

function toggleAutoRefresh() {
  autoRefresh = !autoRefresh;
  document.getElementById('btnAutoRefresh').textContent = autoRefresh ? '⏸ Duraksat' : '▶ Devam Et';
  showToast(
    autoRefresh ? 'Canlı Yenileme Aktif' : 'Canlı Yenileme Durduruldu',
    autoRefresh ? 'Yeni loglar otomatik eklenecek.' : 'Manuel yenileme için sayfayı yenileyin.',
    'info'
  );
}

function exportLogs() {
  showToast('Dışa Aktarılıyor…', `${filtered.length} kayıt CSV olarak hazırlanıyor.`, 'info');
  setTimeout(() => showToast('İndirildi', 'logs_export.csv başarıyla indirildi.', 'success'), 1500);
}

document.addEventListener('DOMContentLoaded', () => {
  initSidebar();

  const params = new URLSearchParams(window.location.search);
  const slugParam = params.get('slug');
  if (slugParam) {
    const sel = document.getElementById('filterPlatform');
    const opt = [...sel.options].find(o => o.value === slugParam);
    if (opt) { sel.value = slugParam; }
  }

  updateStats();
  applyFilters();
});
</script>
</body>
</html>
