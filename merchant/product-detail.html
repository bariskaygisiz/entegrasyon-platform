<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ürün Düzenle — Entegrasyon</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .pd-layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; align-items: start; }
    @media(max-width:900px){ .pd-layout { grid-template-columns: 1fr; } }

    .pd-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; }
    .pd-card-title { font-size: 13px; font-weight: 700; padding: 14px 18px; border-bottom: 1px solid var(--border-light); display:flex; align-items:center; justify-content:space-between; }
    .pd-card-body { padding: 18px; }

    .pd-back { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted); text-decoration: none; margin-bottom: 16px; transition: color .15s; }
    .pd-back:hover { color: var(--text); }

    .pd-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; gap: 16px; flex-wrap: wrap; }
    .pd-header-left h1 { font-size: 20px; font-weight: 800; margin-bottom: 4px; }

    .media-grid { display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-start; }
    .media-thumb { background:var(--bg); border:1.5px solid var(--border); border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; font-size:28px; cursor:pointer; transition:border-color .15s, background .15s; position:relative; overflow:hidden; width:150px; height:150px; flex-shrink:0; }
    .media-thumb.main-thumb { width:220px; height:220px; }
    .media-thumb:hover { border-color:var(--primary); }
    .media-thumb.selected { border-color:var(--primary); background:var(--primary-light,#EEF2FF); }
    .media-thumb.add { border-style:dashed; color:var(--text-muted); flex-direction:column; gap:4px; font-size:20px; overflow:visible; }
    .media-thumb.add span { font-size:11px; font-weight:500; }
    .media-thumb.add:hover { border-color:var(--primary); background:var(--primary-light,#EEF2FF); }
    .media-cb { position:absolute; top:5px; left:5px; width:16px; height:16px; accent-color:var(--primary); cursor:pointer; z-index:2; opacity:0; transition:opacity .15s; }
    .media-thumb:hover .media-cb,
    .media-thumb.selected .media-cb { opacity:1; }
    .media-thumb[draggable=true] { cursor: grab; }
    .media-thumb[draggable=true]:active { cursor: grabbing; }
    .media-thumb.dragging { opacity: 0.35; }
    .media-thumb.drag-over { border-color: var(--primary) !important; outline: 2px dashed var(--primary); outline-offset: -3px; background: var(--primary-light, #EEF2FF) !important; }
    .media-main-badge { position:absolute; bottom:3px; left:3px; right:3px; background:rgba(0,0,0,.55); color:#fff; font-size:9px; font-weight:700; text-align:center; border-radius:3px; padding:2px 0; letter-spacing:.4px; pointer-events:none; }

    .price-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .price-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    .profit-bar { background:var(--bg); border-radius:var(--radius-sm); padding:10px 14px; margin-top:14px; display:flex; justify-content:space-between; align-items:center; font-size:12px; }
    .profit-val { font-weight:700; font-size:13px; }

    .channel-list { display: flex; flex-direction: column; gap: 8px; }
    .channel-row { display:flex; align-items:center; gap:10px; padding:8px 10px; border:1.5px solid var(--border); border-radius:var(--radius-sm); transition: border-color .15s, background .15s; }
    .channel-row.active { border-color:var(--success); background:#F0FDF4; }
    .channel-row input[type=checkbox] { accent-color:var(--success); width:15px; height:15px; }

    .status-select { width:100%; padding:9px 12px; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-size:13px; background:var(--card); color:var(--text); outline:none; }
    .status-select:focus { border-color:var(--primary); }

    .tag-list { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; min-height:24px; }
    .tag { display:inline-flex; align-items:center; gap:4px; padding:3px 8px; background:var(--bg); border:1px solid var(--border); border-radius:20px; font-size:12px; font-weight:500; }
    .tag button { background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:14px; line-height:1; padding:0; }

    .info-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border-light); font-size:12px; }
    .info-row:last-child { border-bottom:none; padding-bottom:0; }
    .info-row .lbl { color:var(--text-muted); }
    .info-row .val { font-weight:600; color:var(--text); }

    .danger-zone { border:1px solid var(--danger-light); border-radius:var(--radius); padding:16px 18px; margin-top:4px; }

    .save-bar { position:sticky; bottom:0; background:var(--card); border-top:1px solid var(--border); padding:12px 0; display:flex; justify-content:flex-end; gap:10px; margin-top:8px; }
  </style>
</head>
<body>
<div class="app">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">E</div>
        <div><div class="logo-text">Entegrasyon<span>Entegrasyon Platformu</span></div></div>
      </div>
      <button class="sidebar-close" id="sidebarClose">×</button>
    </div>
    <div class="sidebar-store">
      <div class="store-avatar">T</div>
      <div><div class="store-name">Teknoloji A.Ş.</div><div class="store-plan">Pro Plan · 6 aktif</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <a href="../index.html" class="nav-item">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        <span>Çıkış Yap</span>
      </a>
    </div>
  </aside>

  <main class="main">
    <header class="header">
      <button class="hamburger" id="hamburger"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
      <div class="header-title" id="headerTitle">Ürün Düzenle</div>
      <div class="header-actions" id="headerActions" style="display:none;gap:8px;">
        <button class="btn btn-ghost btn-sm" onclick="window.location.href='products.html'">Vazgeç</button>
        <button class="btn btn-primary btn-sm" onclick="saveProduct()">Kaydet</button>
      </div>
    </header>

    <div class="page" id="pageContent">
      <div style="display:flex;align-items:center;justify-content:center;height:300px;color:var(--text-muted);">Yükleniyor…</div>
    </div>
  </main>
</div>

<div id="toastContainer" class="toast-container"></div>

<!-- Sil Onay Modal -->
<div class="modal-backdrop" id="deleteModal">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <div class="modal-title">Ürünü Sil</div>
      <button class="modal-close" onclick="closeModal('deleteModal')">×</button>
    </div>
    <div class="modal-body">
      <p style="color:var(--text-secondary);margin-bottom:12px;">Bu ürünü kalıcı olarak silmek istediğinizden emin misiniz?</p>
      <div style="background:var(--danger-light);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;color:var(--danger);">
        ⚠ Bu işlem geri alınamaz. Tüm kanallardaki listeleme kaldırılır.
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('deleteModal')">İptal</button>
      <button class="btn" style="background:var(--danger);color:#fff;" onclick="deleteProduct()">Ürünü Sil</button>
    </div>
  </div>
</div>

<script src="../js/nav.js"></script>
<script src="../js/mock-data.js"></script>
<script src="../js/app.js"></script>
<script src="../js/variants.js"></script>
<script>
const CHANNEL_SETS_D = [
  ['trendyol'], ['trendyol','ikas'], ['trendyol','hepsi'],
  ['trendyol','hepsi','n11','ikas'], ['hepsi','ikas'], ['ikas'],
  ['trendyol','n11'], ['hepsi','n11'], ['trendyol','shopify'],
  ['shopify'], ['trendyol','hepsi','ticimax'], ['ticimax'],
];
const VARIANTS_D = ['', ' - Siyah', ' - Beyaz', ' - Gümüş', ' - Uzay Grisi', ' - Altın', ' - Mavi', ' - Kırmızı', ' - Yeşil', ' - Mor', ' - Sarı', ' - Pembe', ' - Turuncu', ' - Gri', ' - Kahverengi', ' - Lacivert'];
const CHANNEL_META_D = {
  trendyol: { title: 'Trendyol',    favicon: 'trendyol.com'    },
  hepsi:    { title: 'Hepsiburada', favicon: 'hepsiburada.com' },
  n11:      { title: 'N11',         favicon: 'n11.com'         },
  ikas:     { title: 'İkas',        favicon: 'ikas.com'        },
  shopify:  { title: 'Shopify',     favicon: 'shopify.com'     },
  ticimax:  { title: 'Ticimax',     favicon: 'ticimax.com'     },
  ideasoft: { title: 'İdeasoft',    favicon: 'ideasoft.com'    },
};

function genBarcode(seed) {
  let n = '';
  for (let i = 0; i < 13; i++) n += rInt(seed * 7 + i, i + 30, 10);
  return n;
}

function getProduct(id) {
  const i = id - 1, s = id;
  const base = PRODUCTS[i % PRODUCTS.length];
  const variantIdx = Math.floor(i / PRODUCTS.length);
  const variant = VARIANTS_D[variantIdx % VARIANTS_D.length];
  const stockRaw = rInt(s, 22, 10);
  let stock;
  if (stockRaw === 0)     stock = 0;
  else if (stockRaw <= 2) stock = rInt(s, 23, 40) + 5;
  else if (stockRaw <= 3) stock = rInt(s, 23, 3) + 1;
  else                    stock = rInt(s, 23, 80) + 10;
  const statusSeed = rInt(s, 29, 10);
  let status;
  if (statusSeed <= 1) status = 'archived';
  else if (statusSeed <= 3) status = 'draft';
  else status = 'active';
  const priceAdj = 1 + (rInt(s, 24, 21) - 10) / 100;
  const price = Math.round(base.price * priceAdj / 100) * 100 || base.price;
  const cost  = Math.round(price * (0.72 + rInt(s, 25, 16) / 100) / 100) * 100;
  const discountRates = [0, 0, 0, 5, 10, 10, 15, 20, 25, 30];
  const discountRate = discountRates[rInt(s, 27, discountRates.length)];
  const discountedPrice = discountRate > 0 ? Math.round(price * (1 - discountRate / 100) / 100) * 100 : null;
  const channels = CHANNEL_SETS_D[rInt(s, 26, CHANNEL_SETS_D.length)];
  const weight = (0.1 + rInt(s, 28, 50) / 10).toFixed(1);

  // Fake creation date
  const daysAgo = rInt(s, 40, 365);
  const created = new Date(2026, 4, 22);
  created.setDate(created.getDate() - daysAgo);
  const months = ['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
  const createdStr = `${created.getDate()} ${months[created.getMonth()]} ${created.getFullYear()}`;
  const updatedStr = `22 May 2026`;

  // Extract color from variant suffix (e.g. ' - Siyah' → 'Siyah')
  const variantColor = variant ? variant.slice(3) : null;

  // Pre-build sibling colors for same base product (same PRODUCTS entry, different variants)
  const siblingColors = VARIANTS_D.slice(1).map(v => v.slice(3));

  return {
    id, name: base.name + variant,
    sku: base.sku + (variant ? '-' + (variantIdx + 1) : ''),
    barcode: genBarcode(s), emoji: base.emoji, category: base.category,
    price, cost, discountRate, discountedPrice, stock, status, channels, weight,
    createdStr, updatedStr, variantColor, siblingColors,
    description: `${base.name}${variant} — ${base.category.toLowerCase()} kategorisinde öne çıkan ürün. Orijinal kutusuyla birlikte gelir, 2 yıl resmi garanti kapsamındadır.`,
    tags: [base.category, base.name.split(' ')[0]],
  };
}

function recalcProfit() {
  const price = parseFloat(document.getElementById('fPrice').value) || 0;
  const cost  = parseFloat(document.getElementById('fCost').value)  || 0;
  const el    = document.getElementById('profitVal');
  if (!price || !cost) { el.textContent = '—'; el.style.color = 'var(--text-muted)'; return; }
  const m = Math.round(((price - cost) / price) * 100);
  el.textContent = m + '%';
  el.style.color = m >= 20 ? 'var(--success)' : m >= 10 ? 'var(--warning)' : 'var(--danger)';
}

function toggleChannel(c, el) {
  const row = document.getElementById('crow-' + c);
  if (el.checked) row.classList.add('active'); else row.classList.remove('active');
}

function addTag(e, input) {
  if (e.key !== 'Enter') return;
  const val = input.value.trim();
  if (!val) return;
  const span = document.createElement('span');
  span.className = 'tag';
  span.innerHTML = `${val}<button onclick="this.parentElement.remove()">×</button>`;
  document.getElementById('tagList').appendChild(span);
  input.value = '';
}

/* ---- Medya Yönetimi ---- */
let mediaItems  = [];
let mediaNextId = 10;

function initMedia(emoji) {
  mediaItems = [
    { id: 1, src: null, emoji, opacity: 1,    selected: false },
    { id: 2, src: null, emoji, opacity: 0.5,  selected: false },
    { id: 3, src: null, emoji, opacity: 0.25, selected: false },
  ];
  renderMediaGrid();
}

function renderMediaGrid() {
  const grid = document.getElementById('mediaGrid');
  const btn  = document.getElementById('mediaDeleteBtn');
  if (!grid) return;
  const selCount = mediaItems.filter(m => m.selected).length;
  if (btn) {
    btn.style.display = selCount ? 'inline-block' : 'none';
    if (selCount) btn.textContent = selCount + ' görseli sil';
  }
  grid.innerHTML = mediaItems.map((item, idx) => `
    <div class="media-thumb${item.selected ? ' selected' : ''}${idx === 0 ? ' main-thumb' : ''}"
         draggable="true"
         onclick="toggleMediaSelect(${item.id})"
         ondragstart="mediaDragStart(event,${idx})"
         ondragover="mediaDragOver(event)"
         ondragleave="mediaDragLeave(event)"
         ondrop="mediaDrop(event,${idx})"
         ondragend="mediaDragEnd(event)">
      ${item.src
        ? `<img src="${item.src}" style="width:100%;height:100%;object-fit:contain;border-radius:calc(var(--radius-sm) - 2px);">`
        : `<span style="font-size:${idx === 0 ? '36px' : '22px'};opacity:${item.opacity};">${item.emoji}</span>`
      }
      <input class="media-cb" type="checkbox" ${item.selected ? 'checked' : ''}
        onclick="event.stopPropagation();" onchange="toggleMediaSelect(${item.id})">
    </div>
  `).join('') + `
    <label class="media-thumb add" title="Görsel ekle">
      <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      <span>Ekle</span>
      <input type="file" accept="image/*" multiple style="display:none;" onchange="addMediaFiles(this)">
    </label>
  `;
}

let mediaDragSrc = null;
function mediaDragStart(e, idx) {
  mediaDragSrc = idx;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.currentTarget?.classList.add('dragging'), 0);
}
function mediaDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function mediaDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function mediaDrop(e, idx) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (mediaDragSrc === null || mediaDragSrc === idx) return;
  const [moved] = mediaItems.splice(mediaDragSrc, 1);
  mediaItems.splice(idx, 0, moved);
  mediaDragSrc = null;
  renderMediaGrid();
  markDirty();
}
function mediaDragEnd(e) {
  mediaDragSrc = null;
  document.querySelectorAll('.media-thumb').forEach(el => el.classList.remove('drag-over','dragging'));
}

function toggleMediaSelect(id) {
  const item = mediaItems.find(m => m.id === id);
  if (item) { item.selected = !item.selected; renderMediaGrid(); }
}

function deleteSelectedMedia() {
  const count = mediaItems.filter(m => m.selected).length;
  mediaItems = mediaItems.filter(m => !m.selected);
  renderMediaGrid();
  markDirty();
  showToast('Silindi', count + ' görsel kaldırıldı.', 'success');
}

function compressImage(file, maxPx = 1024, quality = 0.78) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxPx || h > maxPx) {
          if (w >= h) { h = Math.round(h * maxPx / w); w = maxPx; }
          else        { w = Math.round(w * maxPx / h); h = maxPx; }
        }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function markDirty() {
  const ha = document.getElementById('headerActions');
  if (ha && ha.style.display === 'none') ha.style.display = 'flex';
}

function addMediaFiles(input) {
  [...input.files].forEach(file => {
    compressImage(file).then(src => {
      mediaItems.push({ id: mediaNextId++, src, selected: false, opacity: 1 });
      renderMediaGrid();
      markDirty();
    });
  });
  input.value = '';
}

function getPageId() {
  const p = new URLSearchParams(location.search).get('id') || '1';
  return /^\d+$/.test(p) ? parseInt(p) : p;
}

function buildNewProduct(id) {
  const raw = JSON.parse(localStorage.getItem('pd_' + id) || 'null');
  if (!raw) return null;
  const price = parseFloat(raw.price) || 0;
  const disc  = parseFloat(raw.discounted) || null;
  return {
    id,
    name:           raw.name             || 'Yeni Ürün',
    description:    raw.desc             || '',
    price,
    discountedPrice: disc,
    discountRate:   disc && price ? Math.round((1 - disc / price) * 100) : 0,
    cost:           parseFloat(raw.cost) || 0,
    sku:            raw.sku              || '',
    barcode:        raw.barcode          || '',
    stock:          (raw.hasVariants && raw.variantData)
                    ? Object.values(raw.variantData).reduce((sum, v) => sum + (parseInt(v.stock) || 0), 0)
                    : (parseInt(raw.stock) || 0),
    weight:         parseFloat(raw.weight) || 0,
    status:         raw.status           || 'draft',
    emoji:          '📦',
    category:       raw.category         || 'Telefon',
    channels:       raw.channels         || [],
    tags:           [],
    variantColor:   null,
    siblingColors:  [],
    createdStr:     raw.createdAt        || new Date().toLocaleDateString('tr-TR'),
    updatedStr:     new Date().toLocaleDateString('tr-TR'),
  };
}

function saveProduct() {
  const id = getPageId();
  const data = {
    name:       document.getElementById('fName')?.value       || '',
    desc:       document.getElementById('fDesc')?.value       || '',
    price:      document.getElementById('fPrice')?.value      || '',
    discounted: document.getElementById('fDiscounted')?.value || '',
    cost:       document.getElementById('fCost')?.value       || '',
    sku:        document.getElementById('fSku')?.value        || '',
    barcode:    document.getElementById('fBarcode')?.value    || '',
    stock:      document.getElementById('fStock')?.value      || '',
    weight:     document.getElementById('fWeight')?.value     || '',
    status:     document.getElementById('fStatus')?.value     || 'active',
    category:       document.getElementById('fCategory')?.value   || '',
    channels:       [...document.querySelectorAll('#channelList input[type=checkbox]:checked')]
                      .map(cb => cb.closest('[id^=crow-]')?.id?.replace('crow-', '')).filter(Boolean),
    media:          mediaItems.map(m => ({ id: m.id, src: m.src || null, emoji: m.emoji || null, opacity: m.opacity || 1 })),
    hasVariants:    document.getElementById('hasVariants')?.checked || false,
    variantOptions: (document.getElementById('hasVariants')?.checked)
                      ? variantOptions.map(o => ({ ...o, values: [...o.values] })) : [],
    variantData:    (document.getElementById('hasVariants')?.checked) ? { ...variantData } : {},
  };
  try {
    localStorage.setItem('pd_' + id, JSON.stringify(data));
    showToast('Kaydedildi', 'Ürün bilgileri başarıyla güncellendi.', 'success');
  } catch (e) {
    try {
      data.media = [];
      localStorage.setItem('pd_' + id, JSON.stringify(data));
      showToast('Kaydedildi', 'Bilgiler kaydedildi. Görseller depolama kotası nedeniyle saklanamadı.', 'warning');
    } catch (e2) {
      showToast('Hata', 'Kaydedilemedi: tarayıcı depolama alanı dolu.', 'error');
    }
  }
}

function deleteProduct() {
  const id = getPageId();
  // Yeni ürünse newProducts listesinden ve pd_<id>'den kaldır
  if (typeof id === 'string') {
    try {
      const list = JSON.parse(localStorage.getItem('newProducts') || '[]');
      localStorage.setItem('newProducts', JSON.stringify(list.filter(p => p.id !== id)));
      localStorage.removeItem('pd_' + id);
    } catch (e) {}
  }
  closeModal('deleteModal');
  showToast('Silindi', 'Ürün başarıyla silindi.', 'error');
  setTimeout(() => window.location.href = 'products.html', 1400);
}

function renderProduct(p) {
  const margin = p.cost > 0 ? Math.round(((p.price - p.cost) / p.price) * 100) : 0;
  const statusMap = { active:'Aktif', draft:'Taslak', archived:'Arşiv' };
  const statusBadgeCls = { active:'badge-success', draft:'badge-warning', archived:'badge-gray' };

  document.getElementById('headerTitle').textContent = p.name;
  document.title = p.name + ' — Entegrasyon';

  document.getElementById('pageContent').innerHTML = `
    <a href="products.html" class="pd-back">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Ürünler
    </a>

    <div class="pd-header">
      <div class="pd-header-left">
        <h1>${p.name}</h1>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:4px;">
          <span class="badge ${statusBadgeCls[p.status]}">${statusMap[p.status]}</span>
          <span id="stockBadge" class="badge badge-danger"${p.stock > 0 ? ' style="display:none;"' : ''}>Stokta Yok</span>
          <span class="badge badge-gray">${p.category}</span>
          <span style="font-size:12px;color:var(--text-muted);">ID: #${String(p.id).replace('new_', '')}</span>
        </div>
      </div>
    </div>

    <div class="pd-layout">

      <!-- SOL SÜTUN -->
      <div>

        <!-- Ürün Bilgisi -->
        <div class="pd-card">
          <div class="pd-card-title">Ürün Bilgisi</div>
          <div class="pd-card-body">
            <div class="form-group">
              <label class="form-label">Ürün Adı</label>
              <input class="form-control" type="text" id="fName" value="${p.name}">
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Açıklama</label>
              <textarea class="form-control" id="fDesc" rows="10" style="resize:vertical;">${p.description}</textarea>
            </div>
          </div>
        </div>

        <!-- Medya -->
        <div class="pd-card">
          <div class="pd-card-title">
            <span>Medya</span>
            <button id="mediaDeleteBtn" onclick="deleteSelectedMedia()"
              style="display:none;background:var(--danger-light);color:var(--danger);border:1px solid var(--danger);border-radius:var(--radius-sm);padding:4px 12px;font-size:11px;font-weight:600;cursor:pointer;">
              Seçilenleri sil
            </button>
          </div>
          <div class="pd-card-body">
            <div class="media-grid" id="mediaGrid"></div>
          </div>
        </div>

        <!-- Varyantlar -->
        <div class="pd-card">
          <div class="pd-card-title">
            <span>Varyantlar</span>
            <label style="display:flex;align-items:center;gap:7px;font-size:12px;font-weight:400;color:var(--text-secondary);cursor:pointer;">
              <input type="checkbox" id="hasVariants" onchange="toggleVariants(this)" style="accent-color:var(--primary);width:14px;height:14px;">
              Bu ürünün farklı seçenekleri var
            </label>
          </div>
          <div id="variantsBody" style="display:none;">
            <div class="pd-card-body" style="border-top:1px solid var(--border-light);">
              <div id="optionsList" style="display:flex;flex-direction:column;gap:10px;margin-bottom:12px;"></div>
              <button class="btn btn-ghost btn-sm" id="addOptBtn" onclick="addVariantOption()" style="font-size:12px;display:inline-flex;align-items:center;gap:5px;">
                <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                Seçenek ekle
              </button>
              <div id="variantsTable" style="margin-top:14px;"></div>
            </div>
          </div>
        </div>

        <!-- Fiyatlandırma -->
        <div class="pd-card" id="pricingCard">
          <div class="pd-card-title">Fiyatlandırma</div>
          <div class="pd-card-body">
            <div class="price-row">
              <div class="form-group">
                <label class="form-label">Satış Fiyatı (₺)</label>
                <input class="form-control" type="number" id="fPrice" value="${p.price}" oninput="recalcProfit();renderVariantsTable();">
              </div>
              <div class="form-group">
                <label class="form-label">İndirimli Fiyat (₺) <span style="color:var(--text-muted);font-weight:400;">opsiyonel</span></label>
                <input class="form-control" type="number" id="fDiscounted" value="${p.discountedPrice || ''}" placeholder="—">
                <div class="price-hint">Dolu ise satış fiyatı üstü çizili gösterilir</div>
              </div>
            </div>
            <div class="price-row" style="margin-top:4px;">
              <div class="form-group" style="margin-bottom:0;">
                <label class="form-label">Maliyet (₺) <span style="color:var(--text-muted);font-weight:400;">müşteriye gösterilmez</span></label>
                <input class="form-control" type="number" id="fCost" value="${p.cost}" oninput="recalcProfit()">
              </div>
            </div>
            <div class="profit-bar">
              <span style="color:var(--text-muted);">Tahmini kâr marjı</span>
              <span class="profit-val" id="profitVal" style="color:${margin>=20?'var(--success)':margin>=10?'var(--warning)':'var(--danger)'}">${margin}%</span>
            </div>
          </div>
        </div>

        <!-- Envanter -->
        <div class="pd-card" id="inventoryCard">
          <div class="pd-card-title">Envanter</div>
          <div class="pd-card-body">
            <div class="price-row">
              <div class="form-group">
                <label class="form-label">SKU (Stok Kodu)</label>
                <input class="form-control" type="text" id="fSku" value="${p.sku}" oninput="renderVariantsTable()">
              </div>
              <div class="form-group">
                <label class="form-label">Barkod (GTIN / EAN)</label>
                <input class="form-control" type="text" id="fBarcode" value="${p.barcode}">
              </div>
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Stok Miktarı</label>
              <input class="form-control" type="number" id="fStock" value="${p.stock}" style="max-width:160px;">
            </div>
          </div>
        </div>

        <!-- Kargo -->
        <div class="pd-card" id="shippingCard">
          <div class="pd-card-title">Kargo</div>
          <div class="pd-card-body">
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Ağırlık (kg)</label>
              <input class="form-control" type="number" step="0.1" id="fWeight" value="${p.weight}" style="max-width:160px;">
            </div>
          </div>
        </div>

      </div>

      <!-- SAĞ SÜTUN -->
      <div>

        <!-- Durum -->
        <div class="pd-card">
          <div class="pd-card-title">Durum</div>
          <div class="pd-card-body">
            <select class="status-select" id="fStatus">
              <option value="active"   ${p.status==='active'   ?'selected':''}>Aktif</option>
              <option value="draft"    ${p.status==='draft'    ?'selected':''}>Taslak</option>
              <option value="archived" ${p.status==='archived' ?'selected':''}>Arşiv</option>
            </select>
            <div id="stockWarn" style="display:${p.stock === 0 ? 'flex' : 'none'};align-items:center;gap:6px;margin-top:10px;padding:8px 12px;background:var(--danger-light,#FEF2F2);border-radius:var(--radius-sm);font-size:12px;color:var(--danger);">
              <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
              <span>Bu ürün <strong>stokta yok</strong> (0 adet)</span>
            </div>
          </div>
        </div>

        <!-- Satış Kanalları -->
        <div class="pd-card">
          <div class="pd-card-title">Satış Kanalları</div>
          <div class="pd-card-body">
            <div class="channel-list">
              ${Object.entries(CHANNEL_META_D).map(([c, meta]) => {
                const checked = p.channels.includes(c);
                return `<div class="channel-row ${checked?'active':''}" id="crow-${c}">
                  <label style="flex:1;display:flex;align-items:center;gap:8px;cursor:pointer;">
                    <input type="checkbox" ${checked?'checked':''} onchange="toggleChannel('${c}',this)" style="accent-color:var(--success);width:15px;height:15px;">
                    <img src="https://www.google.com/s2/favicons?domain=${meta.favicon}&sz=32" width="18" height="18" style="border-radius:3px;">
                    <span style="font-size:13px;font-weight:500;">${meta.title}</span>
                  </label>
                </div>`;
              }).join('')}
            </div>
          </div>
        </div>

        <!-- Organizasyon -->
        <div class="pd-card">
          <div class="pd-card-title">Organizasyon</div>
          <div class="pd-card-body">
            <div class="form-group">
              <label class="form-label">Kategori</label>
              <select class="form-control" id="fCategory">
                ${['Telefon','Bilgisayar','Tablet','Aksesuar','Ses Sistemleri','Monitör','Televizyon','Ev Elektroniği','Fotoğraf'].map(cat =>
                  `<option ${cat===p.category?'selected':''}>${cat}</option>`).join('')}
              </select>
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Etiketler</label>
              <div class="tag-list" id="tagList">
                ${p.tags.map(t=>`<span class="tag">${t}<button onclick="this.parentElement.remove()">×</button></span>`).join('')}
              </div>
              <input class="form-control" type="text" placeholder="Etiket ekle + Enter" style="margin-top:8px;" onkeydown="addTag(event,this)">
            </div>
          </div>
        </div>

        <!-- Ürün Bilgisi -->
        <div class="pd-card">
          <div class="pd-card-title">Ürün Bilgisi</div>
          <div class="pd-card-body">
            <div class="info-row"><span class="lbl">Ürün ID</span><span class="val">#${String(p.id).replace('new_', '')}</span></div>
            <div class="info-row"><span class="lbl">Oluşturulma</span><span class="val">${p.createdStr}</span></div>
            <div class="info-row"><span class="lbl">Son Güncelleme</span><span class="val">${p.updatedStr}</span></div>
            <div class="info-row"><span class="lbl">SKU</span><span class="val">${p.sku}</span></div>
          </div>
        </div>

        <!-- Tehlikeli Bölge -->
        <div class="pd-card" style="border-color:var(--danger-light);">
          <div class="pd-card-title" style="color:var(--danger);">Tehlikeli Bölge</div>
          <div class="pd-card-body">
            <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">Bu ürünü silmek tüm kanallardaki listemelerinizi de kaldırır.</p>
            <button class="btn btn-sm" style="background:var(--danger-light);color:var(--danger);border:1px solid var(--danger);width:100%;" onclick="openModal('deleteModal')">
              Ürünü Sil
            </button>
          </div>
        </div>

      </div>
    </div>

  `;
}

function initProductVariants(p) {
  // Reset shared variant state
  variantOptions = [];
  variantData    = {};

  const cb   = document.getElementById('hasVariants');
  const body = document.getElementById('variantsBody');

  if (p.variantColor) {
    // Ürünün mevcut renk varyantı var → bölümü açık getir, pre-populate et
    variantOptions.push({ id: Date.now(), name: 'Renk', values: [p.variantColor] });
    if (cb)   cb.checked = true;
    if (body) body.style.display = 'block';
    // Varyant değerleri geçerli → Fiyatlandırma, Envanter, Kargo kartlarını gizle
    ['pricingCard','inventoryCard','shippingCard'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = 'none';
    });
    renderVariantOptions();
    updateAddOptBtn();
    renderVariantsTable();
  }
  // Varyant yoksa → checkbox kapalı, bölüm gizli kalır; kullanıcı checkbox'a tıklayınca açılır
}

document.addEventListener('DOMContentLoaded', () => {
  initSidebar();
  initModals();

  // Herhangi bir form alanı değişince header butonlarını göster
  document.addEventListener('input',  e => { if (e.target.closest('.page')) markDirty(); });
  document.addEventListener('change', e => { if (e.target.closest('.page')) markDirty(); });

  const id = getPageId();
  const isNew = typeof id === 'string';

  let p;
  if (isNew) {
    p = buildNewProduct(id);
    if (!p) { window.location.href = 'products.html'; return; }
  } else {
    p = getProduct(id);
  }

  renderProduct(p);
  initMedia(p.emoji);
  initProductVariants(p);

  // Kaydedilmiş verileri localStorage'dan yükle (yeni ürünlerde ilk açılışta zaten p'den geliyor,
  // ama sonraki düzenlemeler için buradan override edilir)
  const saved = JSON.parse(localStorage.getItem('pd_' + id) || 'null');
  if (saved) {
    const sv = (elId, val) => { const el = document.getElementById(elId); if (el && val != null && val !== '') el.value = val; };
    sv('fName', saved.name);
    sv('fDesc', saved.desc);
    sv('fPrice', saved.price);
    sv('fDiscounted', saved.discounted);
    sv('fCost', saved.cost);
    sv('fSku', saved.sku);
    sv('fBarcode', saved.barcode);
    sv('fStock', saved.stock);
    sv('fWeight', saved.weight);
    sv('fStatus', saved.status);
    sv('fCategory', saved.category);
    if (saved.media?.length) {
      mediaItems = saved.media;
      renderMediaGrid();
    }
    recalcProfit();

    // Varyant durumunu geri yükle
    if (saved.hasVariants !== undefined) {
      variantOptions = saved.hasVariants ? (saved.variantOptions || []) : [];
      variantData    = saved.hasVariants ? (saved.variantData    || {}) : {};
      const cb   = document.getElementById('hasVariants');
      const body = document.getElementById('variantsBody');
      if (cb) cb.checked = saved.hasVariants;
      if (body) body.style.display = saved.hasVariants ? 'block' : 'none';
      ['pricingCard', 'inventoryCard', 'shippingCard'].forEach(cardId => {
        const el = document.getElementById(cardId);
        if (el) el.style.display = saved.hasVariants ? 'none' : '';
      });
      if (saved.hasVariants) {
        renderVariantOptions();
        updateAddOptBtn();
        renderVariantsTable();

        // Varyant stoklarını topla; stok varsa uyarıları gizle
        const totalStock = Object.values(saved.variantData || {})
          .reduce((sum, v) => sum + (parseInt(v.stock) || 0), 0);
        if (totalStock > 0) {
          const badge = document.getElementById('stockBadge');
          const warn  = document.getElementById('stockWarn');
          if (badge) badge.style.display = 'none';
          if (warn)  warn.style.display  = 'none';
        }
      }
    }
  }
});
</script>
</body>
</html>
